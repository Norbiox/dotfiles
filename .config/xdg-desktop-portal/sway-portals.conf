# xdg-desktop-portal backend routing for the sway session.
# Read when XDG_CURRENT_DESKTOP contains "sway" (set by sway.desktop), so this
# file is inert under i3/X11.
#
# Why: on a bare wlroots compositor nothing serves the Settings portal, so
# `org.freedesktop.appearance color-scheme` returns "not found" and apps
# (Brave/Chromium, Firefox, Electron, GTK4) fall back to light. Routing the
# Settings impl to the GTK backend makes it report the gsettings color-scheme
# (org.gnome.desktop.interface color-scheme = prefer-dark).
#
# Screenshot/ScreenCast stay on the wlroots backend (grim/wlr-screencopy).

[preferred]
default=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
